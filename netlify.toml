# ============================================
#  SolArt — Netlify configuratie
# ============================================

# ── Build instellingen ──────────────────────
[build]
  command = "npm run build"
  publish = "."

# ── HTTPS redirect (HTTP → HTTPS) ──────────
[[redirects]]
  from   = "http://www.solart.be/*"
  to     = "https://www.solart.be/:splat"
  status = 301
  force  = true

# ── www redirect (non-www → www) ───────────
[[redirects]]
  from   = "https://solart.be/*"
  to     = "https://www.solart.be/:splat"
  status = 301
  force  = true

# ── 404 pagina ─────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

# ── Security headers ───────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Voorkomt clickjacking
    X-Frame-Options = "SAMEORIGIN"
    # Voorkomt MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # Schakelt XSS filter in (legacy browsers)
    X-XSS-Protection = "1; mode=block"
    # Stuurt geen referrer naar externe sites
    Referrer-Policy = "strict-origin-when-cross-origin"
    # HTTPS afdwingen voor 1 jaar
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Beperkt welke bronnen geladen mogen worden
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; img-src 'self' data: https://lh3.googleusercontent.com; connect-src 'self'; frame-ancestors 'none';"
    # Schakelt browser-functies die niet nodig zijn uit
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
